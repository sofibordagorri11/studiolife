<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Belife - Galería</title>

  <!-- ✅ Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Tu CSS -->
  <link rel="stylesheet" href="../style/style.css">
</head>

<body>

  <header>
    <img src="../assets/logo.png" class="logo" alt="Logo Studio Belife">

    <a href="../index.html">
      <h1>STUDIOBELIFE</h1>
    </a>

    <nav>
      <ul>
        <li><a href="../pages/manicura.html">Manicura</a></li>
        <li><a href="../pages/peluqueria.html">Peluquería</a></li>
        <li><a href="../pages/barberia.html">Barbería</a></li>
        <li><a href="../pages/galeria.html" class="active">Galería</a></li>
        <li><a href="../pages/contacto.html">Contacto</a></li>
      </ul>
    </nav>
  </header>

  <!-- ✅ Bootstrap container -->
  <main class="container py-4">

    <div class="text-center mb-4">
      <h2>NUESTRO ESTUDIO</h2>
      <p class="galeria-sub">Un vistazo a nuestros trabajos y al espacio.</p>
    </div>

    <!-- ✅ CARRUSEL / BOOK (Bootstrap Carousel) -->
    <div id="galeriaBook"
         class="carousel slide book-carousel"
         data-bs-ride="carousel"
         data-bs-interval="3000"
         data-bs-pause="hover"
         data-bs-touch="true">

      <!-- ✅ Indicadores (puntitos) -->
      <div class="carousel-indicators">
        <button type="button" data-bs-target="#galeriaBook" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Foto 1"></button>
        <button type="button" data-bs-target="#galeriaBook" data-bs-slide-to="1" aria-label="Foto 2"></button>
        <button type="button" data-bs-target="#galeriaBook" data-bs-slide-to="2" aria-label="Foto 3"></button>
        <button type="button" data-bs-target="#galeriaBook" data-bs-slide-to="3" aria-label="Foto 4"></button>
        <button type="button" data-bs-target="#galeriaBook" data-bs-slide-to="4" aria-label="Foto 5"></button>
        <button type="button" data-bs-target="#galeriaBook" data-bs-slide-to="5" aria-label="Foto 6"></button>
        <button type="button" data-bs-target="#galeriaBook" data-bs-slide-to="6" aria-label="Foto 7"></button>
        <button type="button" data-bs-target="#galeriaBook" data-bs-slide-to="7" aria-label="Foto 8"></button>
        <button type="button" data-bs-target="#galeriaBook" data-bs-slide-to="8" aria-label="Foto 9"></button>
        <button type="button" data-bs-target="#galeriaBook" data-bs-slide-to="9" aria-label="Foto 10"></button>
        <button type="button" data-bs-target="#galeriaBook" data-bs-slide-to="10" aria-label="Foto 11"></button>
        <button type="button" data-bs-target="#galeriaBook" data-bs-slide-to="11" aria-label="Foto 12"></button>
        <button type="button" data-bs-target="#galeriaBook" data-bs-slide-to="12" aria-label="Foto 13"></button>
        <button type="button" data-bs-target="#galeriaBook" data-bs-slide-to="13" aria-label="Foto 14"></button>
        <button type="button" data-bs-target="#galeriaBook" data-bs-slide-to="14" aria-label="Foto 15"></button>
        <button type="button" data-bs-target="#galeriaBook" data-bs-slide-to="15" aria-label="Foto 16"></button>
      </div>

      <!-- ✅ Slides -->
      <div class="carousel-inner rounded-4 shadow-sm overflow-hidden">

        <div class="carousel-item active">
          <img src="../assets/IMG_0290.jpg" class="d-block w-100 book-img" alt="Trabajo 1">
        </div>

        <div class="carousel-item">
          <img src="../assets/IMG_0298.JPG" class="d-block w-100 book-img" alt="Trabajo 2">
        </div>

        <div class="carousel-item">
          <img src="../assets/IMG_0318.JPG" class="d-block w-100 book-img" alt="Trabajo 3">
        </div>

        <div class="carousel-item">
          <img src="../assets/IMG_0478.JPG" class="d-block w-100 book-img" alt="Trabajo 4">
        </div>

        <div class="carousel-item">
          <img src="../assets/IMG_0483.JPG" class="d-block w-100 book-img" alt="Trabajo 5">
        </div>

        <div class="carousel-item">
          <img src="../assets/IMG_0517.JPG" class="d-block w-100 book-img" alt="Trabajo 6">
        </div>

        <div class="carousel-item">
          <img src="../assets/IMG_0272.JPG" class="d-block w-100 book-img" alt="Trabajo 7">
        </div>

        <div class="carousel-item">
          <img src="../assets/IMG_0322.JPG" class="d-block w-100 book-img" alt="Trabajo 8">
        </div>

        <div class="carousel-item">
          <img src="../assets/IMG_0492.JPG" class="d-block w-100 book-img" alt="Trabajo 9">
        </div>

        <div class="carousel-item">
          <img src="../assets/IMG_0509.JPG" class="d-block w-100 book-img" alt="Trabajo 10">
        </div>

        <div class="carousel-item">
          <img src="../assets/1.jpeg" class="d-block w-100 book-img" alt="Trabajo 11">
        </div>

        <div class="carousel-item">
          <img src="../assets/2.jpeg" class="d-block w-100 book-img" alt="Trabajo 12">
        </div>

        <div class="carousel-item">
          <img src="../assets/3.jpeg" class="d-block w-100 book-img" alt="Trabajo 13">
        </div>

        <div class="carousel-item">
          <img src="../assets/4.jpeg" class="d-block w-100 book-img" alt="Trabajo 14">
        </div>

        <div class="carousel-item">
          <img src="../assets/5.jpeg" class="d-block w-100 book-img" alt="Trabajo 15">
        </div>

        <div class="carousel-item">
          <img src="../assets/6.jpeg" class="d-block w-100 book-img" alt="Trabajo 16">
        </div>

      </div>

      <!-- ✅ Flechas -->
      <button class="carousel-control-prev" type="button" data-bs-target="#galeriaBook" data-bs-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Anterior</span>
      </button>

      <button class="carousel-control-next" type="button" data-bs-target="#galeriaBook" data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Siguiente</span>
      </button>

    </div>

  </main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
